<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — BHAI BHAI COMMUNICATION</title>
<link rel="stylesheet" href="./assets/css/style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="login-page">

  <!-- Floating orbs background -->
  <div style="position:absolute;top:10%;left:10%;width:300px;height:300px;background:radial-gradient(circle,rgba(99,102,241,0.15),transparent);border-radius:50%;pointer-events:none;"></div>
  <div style="position:absolute;bottom:15%;right:10%;width:250px;height:250px;background:radial-gradient(circle,rgba(139,92,246,0.15),transparent);border-radius:50%;pointer-events:none;"></div>

  <div class="login-card">
    <div class="login-logo"><i class="bi bi-receipt-cutoff"></i></div>
    <h1 class="login-title">BHAI BHAI COMMUNICATION</h1>
    <p class="login-sub">Sign in to your billing dashboard</p>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label-custom">Username</label>
        <div class="search-bar">
          <i class="bi bi-person"></i>
          <input type="text" id="username" class="form-control-custom" placeholder="Enter username" value="admin" required>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:20px;">
        <label class="form-label-custom">Password</label>
        <div class="search-bar">
          <i class="bi bi-lock"></i>
          <input type="password" id="password" class="form-control-custom" placeholder="Enter password" value="admin123" required>
        </div>
      </div>

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
        <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:rgba(255,255,255,0.65);cursor:pointer;">
          <input type="checkbox" id="rememberMe" style="accent-color:#6366f1;"> Remember me
        </label>
        <span style="font-size:12px;color:rgba(255,255,255,0.4);">v2.0</span>
      </div>

      <button type="submit" class="btn-custom btn-primary-custom" style="width:100%;justify-content:center;padding:11px;font-size:14px;">
        <i class="bi bi-box-arrow-in-right"></i> Sign In
      </button>
      <p id="loginError" style="display:none;color:#f87171;text-align:center;margin-top:12px;font-size:13px;">
        <i class="bi bi-exclamation-circle"></i> Invalid username or password.
      </p>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:12px;color:rgba(255,255,255,0.35);">
      Default: <strong style="color:rgba(255,255,255,0.6);">admin</strong> / <strong style="color:rgba(255,255,255,0.6);">admin123</strong>
    </p>
  </div>

<script src="./assets/js/app.js"></script>
<script>
  if (localStorage.getItem('bills_loggedIn') === 'true') window.location.href = './index.html';

  function handleLogin(e) {
    e.preventDefault();
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    const btn = e.target.querySelector('button[type=submit]');
    btn.innerHTML = '<i class="bi bi-arrow-repeat" style="animation:spin 1s linear infinite;display:inline-block;"></i> Signing in...';
    btn.disabled = true;
    setTimeout(() => {
      if (u === 'admin' && p === 'admin123') {
        if (document.getElementById('rememberMe').checked) {
          localStorage.setItem('bills_rememberMe', 'true');
        }
        localStorage.setItem('bills_loggedIn', 'true');
        window.location.href = './index.html';
      } else {
        document.getElementById('loginError').style.display = 'block';
        btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Sign In';
        btn.disabled = false;
      }
    }, 600);
  }
</script>
<style>
  @keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
</style>
</body>
</html>
